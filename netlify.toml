[build]
  publish = "dist/"
  command = "npm run build"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Przekierowanie dla obrazów statycznych
[[redirects]]
  from = "/uploads/*"
  to = "/uploads/:splat"
  status = 200
